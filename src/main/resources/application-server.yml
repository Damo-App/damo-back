# 배포(Railway) 실행 환경 설정
spring:
  jackson:
    time-zone: Asia/Seoul

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  web:
    resources:
      static-locations: file:/file-assets/

  # AWS SDK 자동설정 제외 (S3 미사용 → EC2 메타데이터 조회로 인한 기동 지연/실패 방지)
  autoconfigure:
    exclude:
      - org.springframework.cloud.aws.autoconfigure.context.ContextCredentialsAutoConfiguration
      - org.springframework.cloud.aws.autoconfigure.context.ContextInstanceDataAutoConfiguration
      - org.springframework.cloud.aws.autoconfigure.context.ContextRegionProviderAutoConfiguration
      - org.springframework.cloud.aws.autoconfigure.context.ContextResourceLoaderAutoConfiguration
      - org.springframework.cloud.aws.autoconfigure.context.ContextStackAutoConfiguration
      - org.springframework.cloud.aws.autoconfigure.messaging.MessagingAutoConfiguration
      - org.springframework.cloud.aws.autoconfigure.metrics.CloudWatchExportAutoConfiguration

  h2:
    console:
      enabled: true
      path: /h2
      settings:
        web-allow-others: true

  datasource:
    url: jdbc:h2:mem:test

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create   # 컨테이너 기동 시 스키마 자동 생성 (인메모리라 재시작 시 초기화됨)
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    defer-datasource-initialization: true

  sql:
    init:
      mode: always
      encoding: UTF-8

  # Redis: Railway에 Redis 플러그인 추가 후 REDIS_HOST/REDIS_PORT 주입. 미설정 시 localhost 폴백.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

springdoc:
  default-flat-param-object: true
  use-fqn: true
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    try-it-out-enabled: true

jwt:
  key: ${JWT_SECRET_KEY}
  access-token-expiration-minutes: 100000
  refresh-token-expiration-minutes: 240000

# StorageConfiguration이 주입받는 값들. S3 미사용이라 더미여도 됨.
cloud:
  aws:
    credentials:
      instance-profile: false
      accessKey: ${AWS_ACCESS_KEY:dummy}
      secretKey: ${AWS_SECRET_ACCESS_KEY:dummy}
    region:
      auto: false
      static: ap-northeast-2
    s3:
      bucket: ${AWS_BUCKET_NAME:dummy}
    stack:
      auto: false

file:
  upload-dir: /file-assets
  default-image: /file-assets/noImage.png

mail:
  address:
    admin: ${ADMIN_EMAIL:admin@google.com}

logging:
  level:
    root: INFO
    org.hibernate.SQL: WARN

server:
  port: ${PORT:8080}
  address: "::"   # Railway 내부 프록시가 IPv6로 접근하므로 IPv6 와일드카드로 바인딩
  servlet:
    encoding:
      force-response: true
  tomcat:
    threads:
      max: 30          # 기본 200 → 30으로 축소 (스레드 스택 메모리 절감)
      min-spare: 5
    max-connections: 200
